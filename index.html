<script>
// Generate the app icon as a canvas PNG and inject it.
// Edit the drawIcon() function below to customise the design.
(function() {
  function drawIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const r = size * 0.18; // rounded corners for iOS icon shape

    // Clip to rounded rectangle
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.clip();

    // ── Greek flag: 9 equal horizontal stripes, blue/white alternating ──
    const blue  = '#0d5eaf';
    const white = '#ffffff';
    const stripeH = size / 9;
    for (let i = 0; i < 9; i++) {
      ctx.fillStyle = (i % 2 === 0) ? blue : white;
      ctx.fillRect(0, i * stripeH, size, stripeH + 0.5); // +0.5 avoids sub-pixel gaps
    }

    // ── Canton (top-left blue square) — 5 stripes tall × 5 stripes wide ──
    const cantonSize = stripeH * 5;
    ctx.fillStyle = blue;
    ctx.fillRect(0, 0, cantonSize, cantonSize);

    // ── White cross inside the canton ──
    // Cross thickness = 1 stripe height
    const crossW  = stripeH;           // thickness of cross arms
    const crossC = cantonSize / 2; // centre of canton

    ctx.fillStyle = white;
    // Horizontal arm
    ctx.fillRect(0, crossC - crossW / 2, cantonSize, crossW);
    // Vertical arm
    ctx.fillRect(crossC - crossW / 2, 0, crossW, cantonSize);

    return c.toDataURL('image/png');
  }

  window.addEventListener('DOMContentLoaded', () => {
    const iconData = drawIcon(180);
    const el = document.getElementById('appIcon');
    const fav = document.getElementById('favIcon');
    if (el) el.href = iconData;
    if (fav) { fav.href = iconData; fav.type = 'image/png'; }
    const logo = document.getElementById('headerLogo');
    if (logo) logo.src = OROBORO_LOGO;
  });
})();
</script>

let currentCat = 0;
let currentLesson = 0;
const quizState = {};

const catNavEl = document.getElementById('catNav');
const lessonNavEl = document.getElementById('lessonNav');
const container = document.getElementById('lessonsContainer');

cats.forEach((c, ci) => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (ci === 0 ? ' active' : '');
  btn.textContent = c.icon + ' ' + c.name;
  btn.onclick = () => selectCat(ci);
  catNavEl.appendChild(btn);
});

function selectCat(ci) {
  currentCat = ci;
  document.querySelectorAll('.cat-btn').forEach((b, i) => b.classList.toggle('active', i === ci));
  buildLessonNav(ci);
  const first = lessons.findIndex(l => l.cat === ci);
  if (first >= 0) showLesson(first);
}

function buildLessonNav(ci) {
  lessonNavEl.innerHTML = '';
  lessons.forEach((l, i) => {
    if (l.cat !== ci) return;
    const btn = document.createElement('button');
    btn.className = 'lesson-pill' + (i === currentLesson ? ' active' : '');
    btn.textContent = l.title;
    btn.dataset.idx = i;
    btn.onclick = () => showLesson(i);
    lessonNavEl.appendChild(btn);
  });
}

function updateLessonNav() {
  lessonNavEl.querySelectorAll('.lesson-pill').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.idx) === currentLesson);
  });
  const active = lessonNavEl.querySelector('.lesson-pill.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ── TTS Configuration ──────────────────────────────────
// After deploying your Cloudflare Worker, replace the URL below
// with your own Worker URL (e.g. https://greek-tts-proxy.xyz.workers.dev)
const TTS_WORKER_URL = 'YOUR_WORKER_URL_HERE';

// Audio cache — avoids re-fetching the same phrase
const audioCache = {};
let currentAudio = null;

function stopCurrentAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
}

function setButtonState(btn, state) {
  document.querySelectorAll('.speak-btn.playing').forEach(b => {
    b.classList.remove('playing');
    b.textContent = '🔊';
  });
  if (btn && state === 'playing') {
    btn.classList.add('playing');
    btn.textContent = '⏸';
  }
  if (btn && state === 'loading') {
    btn.textContent = '⏳';
  }
}

async function speak(text, btn) {
  stopCurrentAudio();

  // If no Worker URL set yet, fall back to browser TTS
  if (!TTS_WORKER_URL || TTS_WORKER_URL === 'YOUR_WORKER_URL_HERE') {
    speakFallback(text, btn);
    return;
  }

  setButtonState(btn, 'loading');

  try {
    // Check cache first
    let audioBase64 = audioCache[text];

    if (!audioBase64) {
      const res = await fetch(TTS_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      if (!res.ok) throw new Error('Worker returned ' + res.status);
      const data = await res.json();
      audioBase64 = data.audio;
      audioCache[text] = audioBase64; // cache it
    }

    // Decode base64 MP3 and play
    const audioSrc = 'data:audio/mp3;base64,' + audioBase64;
    const audio = new Audio(audioSrc);
    currentAudio = audio;

    setButtonState(btn, 'playing');

    audio.onended = () => setButtonState(btn, 'idle');
    audio.onerror = () => {
      setButtonState(btn, 'idle');
      speakFallback(text, btn); // fallback if audio fails
    };

    await audio.play();

  } catch (err) {
    console.warn('TTS Worker failed, using browser fallback:', err);
    setButtonState(btn, 'idle');
    speakFallback(text, btn);
  }
}

// Browser TTS fallback (used if Worker not configured or fails)
function speakFallback(text, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'el-GR';
  utt.rate = 0.82;
  const voices = window.speechSynthesis.getVoices();
  const greek = voices.find(v => v.lang && v.lang.startsWith('el'));
  if (greek) utt.voice = greek;
  if (btn) {
    setButtonState(btn, 'playing');
    utt.onend = () => setButtonState(btn, 'idle');
    utt.onerror = () => setButtonState(btn, 'idle');
  }
  window.speechSynthesis.speak(utt);
  const notice = document.getElementById('ttsNotice');
  if (notice) notice.style.display = 'none';
}

function safe(str) { return (str||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function mkPhrase(p) {
  const d = document.createElement('div');
  d.className = 'phrase-card';
  d.innerHTML = `
    <div class="phrase-body">
      <div class="phrase-greek">${p.greek}</div>
      <div class="phrase-roman">${p.ipa}</div>
      <div class="phrase-english">${p.english}</div>
      ${p.note ? `<div class="phrase-note">${p.note}</div>` : ''}
    </div>
    <button class="speak-btn" onclick="speak('${safe(p.audio||p.greek)}',this)">🔊</button>
  `;
  return d;
}

          <div class="vocab-english">${item.english}</div>
        </div>
        <button class="speak-btn speak-btn-sm" onclick="speak('${safe(item.greek)}',this)">🔊</button>
      </div>
    `;
  });
  card.innerHTML = inner;
  wrap.appendChild(card);
  return wrap;
}

function mkBreakdown(b) {
  const wrap = document.createElement('div');
  const lbl = document.createElement('div'); lbl.className = 'section-hd'; lbl.textContent = b.english;
  wrap.appendChild(lbl);
  const card = document.createElement('div'); card.className = 'breakdown-card';
  card.innerHTML = `
    <div class="breakdown-phrase-row">
      <div class="breakdown-full-greek">${b.phrase}</div>
      <button class="speak-btn" style="width:38px;height:38px;font-size:16px" onclick="speak('${safe(b.phrase)}',this)">🔊</button>
    </div>
    <div class="breakdown-english-label">${b.english}</div>
    <div class="bd-row bd-header"><div class="bd-cell">Greek</div><div class="bd-cell">Pronunciation</div><div class="bd-cell">Meaning</div></div>
    ${b.words.map(w=>`<div class="bd-row"><div class="bd-cell greek">${w.greek}</div><div class="bd-cell roman">${w.ipa}</div><div class="bd-cell">${w.meaning}</div></div>`).join('')}
  `;
  wrap.appendChild(card);
  return wrap;
}

function mkFormRef(fr) {
  const wrap = document.createElement('div');
  const lbl = document.createElement('div'); lbl.className = 'section-hd'; lbl.textContent = 'Form Reference';
  wrap.appendChild(lbl);
  const card = document.createElement('div'); card.className = 'field-ref';
  card.innerHTML = `<div class="field-ref-header">${fr.title}</div>` +
    fr.fields.map(f=>`<div class="field-row"><div class="field-label-en">${f.en}</div><div style="flex:1"><div class="field-label-gr">${f.greek}</div><div class="field-roman">${f.ipa}</div></div><button class="speak-btn speak-btn-sm" onclick="speak('${safe(f.greek)}',this)">🔊</button></div>`).join('');
  wrap.appendChild(card);
  return wrap;
}

function mkQuiz(li, qd) {
  if (!qd || !qd.length) return null;
  if (!quizState[li]) quizState[li] = { cur: 0, score: 0, answered: false };
  const card = document.createElement('div'); card.className = 'quiz-card'; card.id = `quiz-${li}`;
  renderQuiz(card, li, qd);
  return card;
}

function renderQuiz(card, li, qd) {
  const s = quizState[li]; const q = qd[s.cur]; const total = qd.length;
  card.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
      <div class="quiz-label">Quick Quiz</div>
      <div class="quiz-score">${s.cur+1} / ${total} · Score: ${s.score}</div>
    </div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-opts" id="qo-${li}"></div>
    <div class="quiz-fb" id="qf-${li}"></div>
    <div class="quiz-actions">
      <button class="btn-ghost" onclick="resetQuiz(${li})">Restart</button>
      <button class="btn-primary" id="qn-${li}" style="display:none" onclick="nextQ(${li})">${s.cur < total-1 ? 'Next →' : 'Finish'}</button>
    </div>
  `;
  const opts = card.querySelector(`#qo-${li}`);
  q.opts.forEach(opt => {
    const b = document.createElement('button'); b.className = 'quiz-opt'; b.textContent = opt;
    b.onclick = () => answerQ(li, qd, opt, q.a);
    opts.appendChild(b);
  });
}

function answerQ(li, qd, chosen, correct) {
  const s = quizState[li]; if (s.answered) return;
  speak(chosen, null);
  if (chosen !== correct) {
    document.querySelectorAll(`#qo-${li} .quiz-opt`).forEach(b => {
      if (b.textContent === chosen) b.classList.add('wrong');
    });
    return;
  }
  s.answered = true;
  const fb = document.getElementById(`qf-${li}`); const nn = document.getElementById(`qn-${li}`);
  document.querySelectorAll(`#qo-${li} .quiz-opt`).forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  s.score++; fb.textContent = '✓ Correct!'; fb.style.color = 'var(--green)';
  if (nn) nn.style.display = 'inline-block';
}

function nextQ(li) {
  const s = quizState[li]; const qd = lessons[li].quiz; s.cur++; s.answered = false;
  const card = document.getElementById(`quiz-${li}`);
  if (s.cur >= qd.length) {
    const pct = Math.round(s.score / qd.length * 100);
    card.innerHTML = `
      <div class="quiz-label">Quiz Complete!</div>
      <div style="font-size:48px;font-weight:700;color:var(--label);margin:12px 0;letter-spacing:-1px">${s.score}<span style="font-size:24px;color:var(--label3)">/${qd.length}</span></div>
      <div style="font-size:16px;color:var(--label2);margin-bottom:16px">${pct===100?'Perfect! 🎉':pct>=75?'Great job!':pct>=50?'Good — review and try again.':'Keep studying the phrases above.'}</div>
      <button class="btn-ghost" onclick="resetQuiz(${li})">Try Again</button>
    `;
  } else { renderQuiz(card, li, qd); }
}

function resetQuiz(li) {
  quizState[li] = { cur: 0, score: 0, answered: false };
  renderQuiz(document.getElementById(`quiz-${li}`), li, lessons[li].quiz);
}

// ── Reverse Quiz: English → Greek ─────────────────────────
const rquizState = {};

function makeReverseQuiz(qd) {
  // Flip each question: English answer becomes the question, Greek becomes the answer
  return qd.map((item, idx) => {
    const wrongOpts = qd
      .filter((_, i) => i !== idx)
      .map(x => x.q)
      .slice(0, 3);
    const opts = [...wrongOpts, item.q].sort(() => Math.random() - 0.5);
    return { q: item.a, opts, a: item.q };
  });
}

function mkRQuiz(li, qd) {
  if (!qd || !qd.length) return null;
  const rqd = makeReverseQuiz(qd);
  if (!rquizState[li]) rquizState[li] = { cur: 0, score: 0, answered: false, data: rqd };
  else rquizState[li].data = rqd;
  const card = document.createElement('div');
  card.className = 'quiz-card';
  card.id = `rquiz-${li}`;
  renderRQuiz(card, li);
  return card;
}

function renderRQuiz(card, li) {
  const s = rquizState[li];
  const qd = s.data;
  const q = qd[s.cur];
  const total = qd.length;
  card.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
      <div class="quiz-label" style="color:var(--orange)">English → Greek</div>
      <div class="quiz-score">${s.cur+1} / ${total} · Score: ${s.score}</div>
    </div>
    <div class="quiz-q" style="font-size:20px;color:var(--label2)">${q.q}</div>
    <div class="quiz-opts" id="rqo-${li}"></div>
    <div class="quiz-fb" id="rqf-${li}"></div>
    <div class="quiz-actions">
      <button class="btn-ghost" onclick="resetRQuiz(${li})">Restart</button>
      <button class="btn-primary" id="rqn-${li}" style="display:none" onclick="nextRQ(${li})">${s.cur < total-1 ? 'Next →' : 'Finish'}</button>
    </div>
  `;
  const opts = card.querySelector(`#rqo-${li}`);
  q.opts.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'quiz-opt';
    b.style.fontFamily = 'var(--font)';
    b.style.fontSize = '17px';
    b.textContent = opt;
    b.onclick = () => answerRQ(li, opt, q.a);
    opts.appendChild(b);
  });
}

function answerRQ(li, chosen, correct) {
  const s = rquizState[li]; if (s.answered) return;
  speak(chosen, null);
  if (chosen !== correct) {
    document.querySelectorAll(`#rqo-${li} .quiz-opt`).forEach(b => {
      if (b.textContent === chosen) b.classList.add('wrong');
    });
    return;
  }
  s.answered = true;
  const fb = document.getElementById(`rqf-${li}`);
  const nn = document.getElementById(`rqn-${li}`);
  document.querySelectorAll(`#rqo-${li} .quiz-opt`).forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  s.score++; fb.textContent = '✓ Correct!'; fb.style.color = 'var(--green)';
  if (nn) nn.style.display = 'inline-block';
}

function nextRQ(li) {
  const s = rquizState[li]; s.cur++; s.answered = false;
  const card = document.getElementById(`rquiz-${li}`);
  if (s.cur >= s.data.length) {
    const pct = Math.round(s.score / s.data.length * 100);
    card.innerHTML = `
      <div class="quiz-label" style="color:var(--orange)">English → Greek Complete!</div>
      <div style="font-size:48px;font-weight:700;color:var(--label);margin:12px 0;letter-spacing:-1px">${s.score}<span style="font-size:24px;color:var(--label3)">/${s.data.length}</span></div>
      <div style="font-size:16px;color:var(--label2);margin-bottom:16px">${pct===100?'Perfect! 🎉':pct>=75?'Great job!':pct>=50?'Good — keep practising.':'Review the phrases and try again.'}</div>
      <button class="btn-ghost" onclick="resetRQuiz(${li})">Try Again</button>
    `;
  } else { renderRQuiz(card, li); }
}

function resetRQuiz(li) {
  const rqd = makeReverseQuiz(lessons[li].quiz);
  rquizState[li] = { cur: 0, score: 0, answered: false, data: rqd };
  renderRQuiz(document.getElementById(`rquiz-${li}`), li);
}

function showLesson(idx) {
  currentLesson = idx;
  document.querySelectorAll('.lesson').forEach((l, i) => l.classList.toggle('active', i === idx));
  updateLessonNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Build all lesson DOM
lessons.forEach((lesson, i) => {
  const catLessons = lessons.filter(l => l.cat === lesson.cat);
  const pos = catLessons.indexOf(lesson) + 1;
  const div = document.createElement('div');
  div.className = 'lesson' + (i === 0 ? ' active' : '');

  // Progress dots
  const dots = document.createElement('div'); dots.className = 'progress-dots';
  catLessons.forEach((_, di) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (di < pos ? ' done' : '');
    dots.appendChild(dot);
  });
  div.appendChild(dots);

  // Header
  const hd = document.createElement('div'); hd.className = 'lesson-hd';
  hd.innerHTML = `
    <div class="lesson-cat-tag">${cats[lesson.cat].icon} ${cats[lesson.cat].name}</div>
    <div class="lesson-title">${lesson.title}</div>
    <div class="lesson-sub">${lesson.subtitle}</div>
  `;
  div.appendChild(hd);

  // Phrases
  if (lesson.phrases && lesson.phrases.length > 0) {
    const lbl = document.createElement('div'); lbl.className = 'section-hd'; lbl.textContent = 'Phrases';
    div.appendChild(lbl);
    lesson.phrases.forEach(p => div.appendChild(mkPhrase(p)));
  }

  // Diphthongs (second phrases section, used in Alphabet lesson)
  if (lesson.diphthongs) {
    const lbl2 = document.createElement('div'); lbl2.className = 'section-hd'; lbl2.textContent = 'Diphthongs & combinations';
    div.appendChild(lbl2);
    lesson.diphthongs.forEach(p => div.appendChild(mkPhrase(p)));
  }

  // Vocab groups
  if (lesson.vocabGroups) {
    lesson.vocabGroups.forEach(vg => div.appendChild(mkVocabGroup(vg)));
  }

  // Breakdowns
  if (lesson.breakdowns) lesson.breakdowns.forEach(b => div.appendChild(mkBreakdown(b)));

  // Form reference
  if (lesson.formRef) div.appendChild(mkFormRef(lesson.formRef));

  // Tip
  if (lesson.tip) {
    const tip = document.createElement('div'); tip.className = 'tip-box';
    tip.innerHTML = '<span style="margin-right:6px">💡</span>' + lesson.tip;
    div.appendChild(tip);
  }

  // Quiz — Greek → English
  if (lesson.quiz) {
    const q = mkQuiz(i, lesson.quiz); if (q) div.appendChild(q);
  }

  // Reverse Quiz — English → Greek
  if (lesson.quiz && lesson.quiz.length >= 3) {
    const rq = mkRQuiz(i, lesson.quiz); if (rq) div.appendChild(rq);
  }

  // Next button
  const nextIdx = lessons.findIndex((l, li) => li > i && l.cat === lesson.cat);
  if (nextIdx >= 0) {
    const nb = document.createElement('button'); nb.className = 'next-btn';
    nb.innerHTML = `<span>Next: ${lessons[nextIdx].title}</span><span>→</span>`;
    nb.onclick = () => showLesson(nextIdx);
    div.appendChild(nb);
  }

  container.appendChild(div);
});

buildLessonNav(0);
// Pre-load voices for fallback
window.speechSynthesis && (window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices());


</script>
</body>
</html>
